<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIPWAVE GLOBAL | 芯浪國際</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+TC:wght@700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .navy-bg { background-color: #020817; }
        
        /* === LOGO 動效與樣式 === */
        .logo-wave { stroke-dasharray: 100; animation: dash 3s infinite linear; }
        @keyframes dash { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }

        /* === 仿 Rebound 藍色流動線條特效 === */
        .flow-line {
            position: absolute;
            width: 200%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            opacity: 0.3;
            transform: rotate(-15deg);
            animation: flow 4s infinite linear;
        }
        @keyframes flow {
            0% { left: -100%; top: 20%; }
            100% { left: 100%; top: 80%; }
        }
        .flow-line:nth-child(2) { animation-delay: 1.5s; top: 40%; opacity: 0.2; }
        .flow-line:nth-child(3) { animation-delay: 3s; top: 10%; opacity: 0.1; }

        .hero-overlay { background: radial-gradient(circle at center, rgba(2, 8, 23, 0.6) 0%, rgba(2, 8, 23, 0.95) 100%); }
        [data-lang="en"] { display: none; }
        
        .fade-in-up { animation: fadeInUp 1s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .brand-logo-item { filter: grayscale(100%); opacity: 0.5; transition: all 0.4s ease; font-style: normal !important; letter-spacing: 0.05em; }
        .brand-logo-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.05); }
    </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <svg width="40" height="40" viewBox="0 0 100 100" class="text-blue-600">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" opacity="0.2"/>
                    <path d="M30 50 Q 50 20, 70 50 T 70 50" fill="none" stroke="currentColor" stroke-width="6" class="logo-wave"/>
                    <path d="M25 60 Q 50 35, 75 60" fill="none" stroke="currentColor" stroke-width="4" opacity="0.5"/>
                </svg>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tighter text-blue-900 leading-none uppercase">Chipwave Global</span>
                    <span class="text-[9px] tracking-[0.3em] text-blue-500 font-bold mt-1 uppercase">芯浪國際有限公司</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleLang()" class="bg-blue-900 text-white px-4 py-1.5 rounded-full text-[10px] font-black hover:bg-blue-600 transition uppercase tracking-widest">
                    <span id="langText">English</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="h-screen flex items-center justify-center relative text-white navy-bg overflow-hidden">
        <div class="flow-line"></div>
        <div class="flow-line"></div>
        <div class="flow-line"></div>
        
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-40" 
             style="background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=70');">
        </div>
        <div class="absolute inset-0 hero-overlay"></div>
        
        <div class="relative z-10 text-center px-4 max-w-5xl fade-in-up">
            <h1 class="text-6xl md:text-8xl font-black mb-8 tracking-tighter leading-none">

            </h1>

                <span data-lang="zh">立足香港，服務全球。芯浪國際為您提供高效、透明、值得信賴的電子元器件採購與數據中心
